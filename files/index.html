<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAANA BAANA — Clothing Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FDFAF5;--ink:#1C1A14;--muted:#8C8676;--accent:#B85C2A;--accent-lt:#F2E4D6;
  --surface:#FFFFFF;--border:#E6E0D4;--success:#2E7D52;--danger:#B83232;
  --card-shadow:0 2px 16px rgba(28,26,20,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;min-height:100vh;}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:66px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;letter-spacing:4px;color:var(--ink);text-decoration:none;}
.logo span{color:var(--accent);}
.cart-btn{background:var(--ink);color:#fff;border:none;padding:9px 20px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s;}
.cart-btn:hover{background:var(--accent);}
.cart-badge{background:var(--accent);color:#fff;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}

/* HERO */
.hero{padding:64px 24px 56px;text-align:center;background:var(--ink);color:#fff;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--accent);}
.hero-eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:14px;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,7vw,80px);font-weight:700;line-height:1.05;margin-bottom:14px;}
.hero p{font-size:15px;color:rgba(255,255,255,.5);font-weight:300;}

/* FILTER BAR */
.filter-bar{max-width:1200px;margin:36px auto 0;padding:0 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filt{padding:8px 18px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif;}
.filt:hover,.filt.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.search-wrap{margin-left:auto;position:relative;}
.search-wrap input{padding:8px 14px 8px 36px;border:1px solid var(--border);border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px;background:var(--surface);outline:none;width:210px;transition:border-color .2s;color:var(--ink);}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}

/* GRID */
.grid-wrap{max-width:1200px;margin:28px auto 80px;padding:0 24px;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:default;transition:transform .2s,box-shadow .2s;}
.pcard:hover{transform:translateY(-4px);box-shadow:var(--card-shadow);}
.pcard-img{width:100%;aspect-ratio:3/4;background:var(--accent-lt);display:flex;align-items:center;justify-content:center;font-size:52px;overflow:hidden;}
.pcard-img img{width:100%;height:100%;object-fit:cover;}
.pcard-body{padding:14px 16px 16px;}
.pcard-cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.pcard-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;margin-bottom:4px;line-height:1.25;}
.pcard-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pcard-foot{display:flex;align-items:center;justify-content:space-between;}
.price{font-size:17px;font-weight:600;}
.add-btn{background:var(--ink);color:#fff;border:none;padding:7px 13px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .18s;}
.add-btn:hover{background:var(--accent);}
.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--muted);}
.empty-icon{font-size:52px;margin-bottom:12px;}

/* CART DRAWER */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;opacity:0;pointer-events:none;transition:opacity .28s;}
.ovl.on{opacity:1;pointer-events:all;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(380px,100vw);background:var(--surface);z-index:201;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column;border-left:1px solid var(--border);}
.drawer.on{transform:translateX(0);}
.dhead{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.dhead h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.xbtn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;}
.ditems{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px;}
.citem{display:flex;gap:12px;padding:12px;background:var(--bg);border-radius:8px;align-items:flex-start;}
.cimg{width:52px;height:66px;border-radius:5px;background:var(--accent-lt);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.cimg img{width:100%;height:100%;object-fit:cover;}
.cname{font-size:14px;font-weight:500;margin-bottom:2px;}
.cprice{font-size:13px;color:var(--accent);font-weight:600;}
.cremove{background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;margin-top:4px;}
.dfoot{padding:20px 24px;border-top:1px solid var(--border);}
.dtotal{display:flex;justify-content:space-between;font-size:16px;font-weight:500;margin-bottom:14px;}
.checkout-btn{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .2s;}
.checkout-btn:hover{background:var(--accent);}
.empty-cart{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;}

/* ORDER CONFIRM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-bg.on{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:36px 32px;max-width:420px;width:100%;text-align:center;}
.modal-icon{font-size:48px;margin-bottom:16px;}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.modal-form input{width:100%;margin-bottom:12px;padding:10px 13px;border:1px solid var(--border);border-radius:7px;font-family:'Outfit',sans-serif;font-size:14px;background:var(--bg);color:var(--ink);outline:none;}
.modal-form input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:10px;}
.mbtn{flex:1;padding:12px;border-radius:7px;border:none;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.mbtn-ok{background:var(--ink);color:#fff;}
.mbtn-ok:hover{background:var(--accent);}
.mbtn-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--border);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;z-index:600;transition:transform .28s;white-space:nowrap;}
.toast.on{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">TAANA <span>BAANA</span></a>
    <button class="cart-btn" onclick="openCart()">
      🛍 Cart <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">New Collection 2024</div>
  <h1>Wear Your<br>Story</h1>
  <p>Handpicked styles for every occasion</p>
</div>

<div class="filter-bar">
  <button class="filt on" onclick="setFilter('All',this)">All</button>
  <button class="filt" onclick="setFilter('Men',this)">Men</button>
  <button class="filt" onclick="setFilter('Women',this)">Women</button>
  <button class="filt" onclick="setFilter('Kids',this)">Kids</button>
  <button class="filt" onclick="setFilter('Ethnic',this)">Ethnic</button>
  <button class="filt" onclick="setFilter('Casual',this)">Casual</button>
  <div class="search-wrap">
    <input type="text" placeholder="Search products..." oninput="setSearch(this.value)">
  </div>
</div>

<div class="grid-wrap">
  <div class="pgrid" id="pgrid"></div>
</div>

<!-- Cart -->
<div class="ovl" id="ovl" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="dhead">
    <h2>Your Cart</h2>
    <button class="xbtn" onclick="closeCart()">✕</button>
  </div>
  <div class="ditems" id="ditems"></div>
  <div class="dfoot">
    <div class="dtotal"><span>Total</span><span id="dtotal">₹0</span></div>
    <button class="checkout-btn" onclick="startCheckout()">Place Order →</button>
  </div>
</div>

<!-- Order modal -->
<div class="modal-bg" id="order-modal">
  <div class="modal">
    <div class="modal-icon">🛍</div>
    <h3>Confirm Order</h3>
    <p>Enter your details and we'll contact you to confirm delivery.</p>
    <div class="modal-form">
      <input type="text" id="o-name" placeholder="Your name *">
      <input type="text" id="o-phone" placeholder="Phone number *">
      <input type="text" id="o-address" placeholder="Delivery address">
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-ok" onclick="placeOrder()">Confirm Order ✓</button>
      <button class="mbtn mbtn-cancel" onclick="closeOrderModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='tb_products';
const CART_KEY='tb_cart';
const ORDERS_KEY='tb_orders';

let filter='All', search='', cart=JSON.parse(localStorage.getItem(CART_KEY)||'[]');

function getProducts(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}

function render(){
  const grid=document.getElementById('pgrid');
  let prods=getProducts();
  if(filter!=='All') prods=prods.filter(p=>p.cat===filter);
  if(search) prods=prods.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||(p.desc||'').toLowerCase().includes(search.toLowerCase()));
  if(!prods.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">👗</div><p>No products found</p></div>`;
    return;
  }
  grid.innerHTML=prods.map(p=>`
    <div class="pcard">
      <div class="pcard-img">${p.img?`<img src="${p.img}" alt="${p.name}" onerror="this.parentElement.innerHTML='👗'">`:'👗'}</div>
      <div class="pcard-body">
        <div class="pcard-cat">${p.cat||''}</div>
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-desc">${p.desc||'&nbsp;'}</div>
        <div class="pcard-foot">
          <span class="price">₹${Number(p.price).toLocaleString('en-IN')}</span>
          <button class="add-btn" onclick="addCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${(p.img||'').replace(/'/g,"\\'")}')">Add to cart</button>
        </div>
      </div>
    </div>`).join('');
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function setSearch(v){search=v;render();}

// Cart
function addCart(id,name,price,img){
  cart.push({id,name,price:Number(price),img});
  saveCart();
  toast(`${name} added to cart!`);
}
function saveCart(){
  localStorage.setItem(CART_KEY,JSON.stringify(cart));
  document.getElementById('cart-count').textContent=cart.length;
}
function openCart(){renderCart();document.getElementById('drawer').classList.add('on');document.getElementById('ovl').classList.add('on');}
function closeCart(){document.getElementById('drawer').classList.remove('on');document.getElementById('ovl').classList.remove('on');}
function renderCart(){
  const el=document.getElementById('ditems');
  if(!cart.length){el.innerHTML='<div class="empty-cart">Your cart is empty 🛍</div>';document.getElementById('dtotal').textContent='₹0';return;}
  el.innerHTML=cart.map((c,i)=>`
    <div class="citem">
      <div class="cimg">${c.img?`<img src="${c.img}" onerror="this.parentElement.innerHTML='👗'">`:'👗'}</div>
      <div style="flex:1">
        <div class="cname">${c.name}</div>
        <div class="cprice">₹${Number(c.price).toLocaleString('en-IN')}</div>
        <button class="cremove" onclick="removeCart(${i})">Remove</button>
      </div>
    </div>`).join('');
  document.getElementById('dtotal').textContent='₹'+cart.reduce((s,c)=>s+c.price,0).toLocaleString('en-IN');
}
function removeCart(i){cart.splice(i,1);saveCart();renderCart();}

// Order
function startCheckout(){
  if(!cart.length){toast('Your cart is empty!');return;}
  closeCart();
  document.getElementById('order-modal').classList.add('on');
}
function closeOrderModal(){document.getElementById('order-modal').classList.remove('on');}
function placeOrder(){
  const name=document.getElementById('o-name').value.trim();
  const phone=document.getElementById('o-phone').value.trim();
  if(!name||!phone){toast('Please enter your name and phone!');return;}
  const orders=JSON.parse(localStorage.getItem(ORDERS_KEY)||'[]');
  orders.push({id:'ORD'+Date.now(),name,phone,address:document.getElementById('o-address').value.trim(),items:[...cart],total:cart.reduce((s,c)=>s+c.price,0),date:new Date().toLocaleString('en-IN'),status:'Pending'});
  localStorage.setItem(ORDERS_KEY,JSON.stringify(orders));
  cart=[];saveCart();
  closeOrderModal();
  ['o-name','o-phone','o-address'].forEach(id=>document.getElementById(id).value='');
  toast('Order placed! We will contact you soon 🎉');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2800);
}

document.getElementById('cart-count').textContent=cart.length;
render();

// Live reload when admin adds products (same browser)
window.addEventListener('storage',e=>{if(e.key===STORAGE_KEY)render();});
</script>
</body>
</html>
